name: Jellyfin uptime check

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 min
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check server
        run: |
          URL="${{ secrets.JELLYFIN_URL }}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
            STATUS="up"
          else
            STATUS="down"
          fi

          # read existing data
          MOVIES=$(jq '.movies' status.json)
          SHOWS=$(jq '.shows' status.json)
          EPISODES=$(jq '.episodes' status.json)
          BOOKS=$(jq '.books' status.json)

          # write updated file
          cat <<EOF > status.json
{
  "status": "$STATUS",
  "movies": $MOVIES,
  "shows": $SHOWS,
  "episodes": $EPISODES,
  "books": $BOOKS,
  "checkedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
}
EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git commit -m "Update uptime status" || exit 0
          git push
