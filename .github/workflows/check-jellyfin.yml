name: Check Jellyfin uptime

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Jellyfin
        run: |
          URL="${{ secrets.JELLYFIN_URL }}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
            STATUS="up"
          else
            STATUS="down"
          fi

          echo "{\"status\": \"$STATUS\", \"code\": \"$HTTP_CODE\", \"checkedAt\": \"$(date -u)\"}" > status.json

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          git commit -m "Update Jellyfin status" || exit 0
          git push
