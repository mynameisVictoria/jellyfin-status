name: Jellyfin uptime check v2

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check server + update status.json
        run: |
          set -e

          URL="${{ secrets.JELLYFIN_URL }}"

          # Check if server is reachable
          if curl -L --fail --max-time 10 "$URL" > /dev/null; then
            STATUS="up"
          else
            STATUS="down"
          fi

          # Read existing values safely
          MOVIES=$(jq -r '.movies' status.json)
          SHOWS=$(jq -r '.shows' status.json)
          EPISODES=$(jq -r '.episodes' status.json)
          BOOKS=$(jq -r '.books' status.json)

          # Write new JSON safely (NO heredoc, NO YAML traps)
          echo "{
            \"status\": \"$STATUS\",
            \"movies\": $MOVIES,
            \"shows\": $SHOWS,
            \"episodes\": $EPISODES,
            \"books\": $BOOKS
          }" > status.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add status.json

          git commit -m "Update Jellyfin status" || exit 0

          git push
